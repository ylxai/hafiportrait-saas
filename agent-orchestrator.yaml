port: 3001
defaults:
  runtime: tmux
  agent: opencode
  workspace: worktree
  notifiers:
    - desktop
projects:
  web-saas:
    repo: ylxai/hafiportrait-saas
    path: ~/web-saas
    defaultBranch: main
    sessionPrefix: saas
    symlinks:
      - .env
    postCreate:
      - npm install
    agentRulesFile: AGENTS.md
    orchestrator:
      agent: opencode
      agentConfig:
        model: fireworks-ai/accounts/fireworks/routers/kimi-k2p5-turbo
    worker:
      agent: opencode
      agentConfig:
        model: fireworks-ai/accounts/fireworks/routers/kimi-k2p5-turbo
reactions:
  ci-failed:
    auto: true
    action: send-to-agent
    retries: 2
  changes-requested:
    auto: true
    action: send-to-agent
    escalateAfter: 30m
  approved-and-green:
    auto: false
    action: notify
